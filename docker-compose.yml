version: '3.8'

services:
  autenticador-api:
    build: .
    ports: 
      - "8081:8080"
    depends_on:
      - "postgres"

  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: ctePGSQL
      POSTGRES_USER: sa
      POSTGRES_DB: autenticadorDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: